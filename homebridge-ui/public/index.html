<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanit Auth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
      color: #e0e0e0;
      background: transparent;
    }

    .card {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 20px;
      max-width: 420px;
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #2196F3; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 6px;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #2196F3; color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }

    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    .alert-success { background: #1b3a2a; border: 1px solid #2e7d52; color: #4caf7d; }
    .alert-error   { background: #3a1b1b; border: 1px solid #7d2e2e; color: #f47c7c; }
    .alert-warn    { background: #3a2e1a; border: 1px solid #7d6020; color: #f0b840; }

    .mfa-hint {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 14px;
      padding: 10px;
      background: #1a1a1a;
      border-radius: 6px;
      border-left: 3px solid #2196F3;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">

    <!-- Step 1: Login -->
    <div id="step-login">
      <h2>Sign in to Nanit</h2>
      <p class="subtitle">Fetches a refresh token and saves it directly to your config.</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="btn-login" onclick="login()">Sign In</button>
    </div>

    <!-- Step 2: MFA -->
    <div id="step-mfa" style="display:none">
      <h2>Two-Factor Authentication</h2>
      <p class="subtitle">Enter the code sent to your phone.</p>

      <div class="mfa-hint" id="mfa-hint">Code sent to your phone ending in ??</div>

      <div class="form-group">
        <label>MFA Code</label>
        <input type="text" id="mfa-code" placeholder="123456" inputmode="numeric" maxlength="8" autocomplete="one-time-code">
      </div>
      <button class="btn btn-primary" id="btn-mfa" onclick="verifyMfa()">Verify</button>
    </div>

    <div class="alert alert-success" id="alert-success"></div>
    <div class="alert alert-error"   id="alert-error"></div>
    <div class="alert alert-warn"    id="alert-warn"></div>
  </div>

  <script>
    let mfaToken = null;
    let savedEmail = null;
    let savedPassword = null;

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="spinner"></span>Please wait…'
        : (btnId === 'btn-login' ? 'Sign In' : 'Verify');
    }

    function showAlert(type, msg) {
      ['success', 'error', 'warn'].forEach(t => {
        const el = document.getElementById(`alert-${t}`);
        el.style.display = 'none';
        el.textContent = '';
      });
      const el = document.getElementById(`alert-${type}`);
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showAlert('error', 'Email and password are required.'); return; }

      showAlert('warn', '');
      setLoading('btn-login', true);

      let result;
      try {
        result = await homebridge.request('/login', { email, password });
      } catch (err) {
        showAlert('error', `Request failed: ${err.message}`);
        setLoading('btn-login', false);
        return;
      }

      setLoading('btn-login', false);

      if (result.status === 'success') {
        await saveToken(result.refresh_token);
      } else if (result.status === 'mfa_required') {
        savedEmail    = email;
        savedPassword = password;
        mfaToken      = result.mfa_token;
        document.getElementById('mfa-hint').textContent =
          `Code sent to your phone ending in ${result.phone_suffix}`;
        document.getElementById('step-login').style.display = 'none';
        document.getElementById('step-mfa').style.display   = 'block';
        document.getElementById('mfa-code').focus();
      } else if (result.status === 'rate_limited') {
        showAlert('warn', 'Rate limited by Nanit — wait 5 minutes before trying again.');
      } else {
        showAlert('error', result.message || 'Login failed.');
      }
    }

    async function verifyMfa() {
      const mfa_code = document.getElementById('mfa-code').value.trim();
      if (!mfa_code) { showAlert('error', 'Enter the MFA code.'); return; }

      setLoading('btn-mfa', true);

      let result;
      try {
        result = await homebridge.request('/mfa', {
          email: savedEmail, password: savedPassword,
          mfa_token: mfaToken, mfa_code,
        });
      } catch (err) {
        showAlert('error', `Request failed: ${err.message}`);
        setLoading('btn-mfa', false);
        return;
      }

      setLoading('btn-mfa', false);

      if (result.status === 'success') {
        await saveToken(result.refresh_token);
      } else if (result.status === 'rate_limited') {
        showAlert('warn', 'Rate limited by Nanit — wait 5 minutes before trying again.');
      } else {
        showAlert('error', result.message || 'MFA verification failed.');
      }
    }

    async function saveToken(refreshToken) {
      try {
        const configs = await homebridge.getPluginConfig();
        const config  = configs[0] || {};
        config.refreshToken = refreshToken;
        await homebridge.updatePluginConfig([config]);
        await homebridge.savePluginConfig();
        document.getElementById('step-login').style.display = 'none';
        document.getElementById('step-mfa').style.display   = 'none';
        showAlert('success', 'Token saved to your config. You can close this and restart Homebridge.');
      } catch (err) {
        showAlert('error', `Failed to save token: ${err.message}`);
      }
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
    document.getElementById('mfa-code').addEventListener('keydown', e => {
      if (e.key === 'Enter') verifyMfa();
    });
  </script>
</body>
</html>
