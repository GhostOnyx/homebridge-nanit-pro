name: CI / Publish

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Sanity & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Syntax check
        run: |
          node --check src/index.js
          node --check src/platform.js
          node --check src/camera.js
          node --check src/localStreamingDelegate.js
          node --check src/streamingDelegate.js
          node --check src/authServer.js
          node --check src/recordingDelegate.js
          node --check src/cli.js

      - name: Security audit
        run: npm audit --audit-level=high

      - name: No hardcoded secrets
        run: |
          # Catch literal API keys / tokens / passwords accidentally committed
          if grep -rEn \
            '(refreshToken|accessToken|password)\s*[:=]\s*["'"'"'][A-Za-z0-9+/]{20,}' \
            src/ --include='*.js'; then
            echo "Possible hardcoded credential in src/"
            exit 1
          fi

      - name: Version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "package.json version ($PKG) does not match tag ($TAG)"
            exit 1
          fi
          echo "Version check passed: $PKG"

  publish:
    name: Publish to npm
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Publish
        run: npm publish --provenance --access public
